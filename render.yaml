services:
  # FastAPI Backend Service
  - type: web
    name: veritas-ai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free # Render free tier (512MB RAM)
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: MONGODB_URI
        sync: false # Set in Render Dashboard
      - key: JWT_SECRET
        sync: false # Set in Render Dashboard
      - key: GEMINI_API_KEY
        sync: false # Set in Render Dashboard
      - key: ALLOWED_ORIGINS
        sync: false # Set in Render Dashboard (frontend domain)
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "none" # Set to none for cross-site cookie if backend & frontend have different domains
